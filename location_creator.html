<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Location Creator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Spectral:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap');

:root {
  --night: #121017;
  --paper: #ece2cf;
  --paper-dim: #d2c3a6;
  --accent: #2e5a3b;
  --accent-2: #c4983a;
  --glow: #8fc6a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  color: var(--paper);
  font-family: 'Source Sans 3', sans-serif;
  background:
    radial-gradient(900px 500px at 8% 0%, rgba(46,90,59,0.28), transparent 60%),
    radial-gradient(800px 500px at 100% 100%, rgba(196,152,58,0.18), transparent 50%),
    linear-gradient(155deg, #0e1208, #131a0f 45%, #0f1710);
  padding: 0;
}

.shell {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px;
}

.site-nav {
  background: rgba(10,13,18,0.97);
  border-bottom: 1px solid rgba(196,152,58,0.3);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  flex-wrap: wrap;
}
.nav-brand {
  font-family: 'Cinzel', serif;
  color: #c4983a;
  font-size: 0.95rem;
  letter-spacing: 1.5px;
  padding: 14px 20px 14px 0;
  margin-right: 8px;
  border-right: 1px solid rgba(196,152,58,0.3);
  white-space: nowrap;
}
.nav-brand span { color: #dcc79a; font-size: 0.8rem; display: block; letter-spacing: 0.5px; }
.site-nav a {
  color: #a8b6c8;
  text-decoration: none;
  padding: 14px 14px;
  font-size: 0.88rem;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.site-nav a:hover { color: #c4983a; border-bottom-color: rgba(196,152,58,0.4); }
.site-nav a.active { color: #c4983a; border-bottom-color: #c4983a; }

.card {
  border: 1px solid rgba(46,90,59,0.5);
  border-radius: 14px;
  padding: 18px 20px;
  background: linear-gradient(160deg, rgba(8,14,10,0.7), rgba(14,22,16,0.75));
  margin-bottom: 14px;
}

.card h2 {
  font-family: 'Spectral', serif;
  color: var(--paper-dim);
  margin-bottom: 14px;
  font-size: 1.2rem;
}

.row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 8px;
  margin-bottom: 8px;
}

.row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

@media (max-width: 600px) { .row-2 { grid-template-columns: 1fr; } }

label {
  display: block;
  font-size: 0.8rem;
  color: #b8aa8a;
  margin-bottom: 3px;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.5px;
}

input, textarea, select {
  width: 100%;
  border: 1px solid rgba(46,90,59,0.5);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--paper);
  background: rgba(0,0,0,0.28);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.93rem;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: rgba(196,152,58,0.5);
}
select option { background: #1a2a1a; }

textarea { resize: vertical; }
textarea.short { min-height: 72px; }
textarea.tall  { min-height: 110px; }

.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

button {
  border: 1px solid rgba(46,90,59,0.6);
  border-radius: 8px;
  padding: 8px 13px;
  color: var(--paper);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  white-space: nowrap;
}
button:hover { border-color: var(--accent-2); color: var(--accent-2); }

.btn-main {
  background: linear-gradient(135deg, #1e3d28, #2e5a3b);
  border-color: #2e5a3b;
}
.btn-main:hover { color: var(--paper); border-color: #4a8a5a; }

.btn-campaign {
  background: linear-gradient(135deg, #6b4a10, #a33a2b);
  border-color: #a33a2b;
}
.btn-campaign:hover { color: var(--paper); border-color: #c45030; }

.preview {
  border: 1px dashed rgba(46,90,59,0.6);
  border-radius: 10px;
  padding: 14px;
  margin-top: 12px;
  color: #e2d8c4;
  background: rgba(0,0,0,0.22);
  font-size: 0.92rem;
  line-height: 1.6;
}

.preview strong { font-family: 'Cinzel', serif; color: var(--paper-dim); font-size: 1rem; }
.preview .loc-type { color: var(--accent-2); font-size: 0.8rem; font-family: 'Cinzel', serif; letter-spacing: 1px; text-transform: uppercase; }
.preview .loc-section { color: #8fc6a8; font-size: 0.78rem; font-family: 'Cinzel', serif; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; margin-bottom: 2px; }

.flash {
  min-height: 18px;
  margin-top: 8px;
  font-size: 0.9rem;
  color: var(--glow);
}

.divider {
  border: none;
  border-top: 1px solid rgba(46,90,59,0.35);
  margin: 14px 0;
}

/* ── Registry ── */
.registry-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  margin-top: 12px;
}

.reg-card {
  border: 1px solid rgba(46,90,59,0.45);
  border-radius: 10px;
  padding: 12px 14px;
  background: rgba(0,0,0,0.22);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.reg-card:hover { border-color: var(--accent-2); }

.reg-card-name {
  font-family: 'Cinzel', serif;
  color: var(--paper-dim);
  font-size: 0.95rem;
}

.reg-card-type {
  font-size: 0.75rem;
  color: var(--accent-2);
  font-family: 'Cinzel', serif;
  letter-spacing: 0.5px;
}

.reg-card-desc {
  color: #a8b6a0;
  font-size: 0.82rem;
  line-height: 1.4;
}

.reg-card-actions {
  display: flex;
  gap: 6px;
  margin-top: 2px;
  flex-wrap: wrap;
}

.reg-card-actions button {
  padding: 5px 10px;
  font-size: 0.8rem;
}

.btn-danger { background: rgba(100,20,20,0.3); border-color: rgba(160,40,40,0.5); }
.btn-danger:hover { border-color: #e05050; color: #e05050; }

.empty {
  color: #6a7a6a;
  font-style: italic;
  border: 1px dashed rgba(46,90,59,0.35);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<script>
const STORAGE_KEY = 'dndToolsLocations';
const ADD_KEY     = 'dndToolsAddLocationToCampaign';
const MAP_KEY     = 'dndToolsMap';

// ── Map Storage Helpers ───────────────────────────────────────
function safeReadMap() {
  try {
    const v = JSON.parse(localStorage.getItem(MAP_KEY)||'null');
    if (v && typeof v === 'object' && !Array.isArray(v)) return v;
    return { regions:[], locations:[] };
  } catch { return { regions:[], locations:[] }; }
}
function safeWriteMap(v) { localStorage.setItem(MAP_KEY, JSON.stringify(v)); }
function uidMap(p) { return `${p}-${Date.now()}-${Math.floor(Math.random()*100000)}`; }

// ── Tab Switching ─────────────────────────────────────────────
function setCreatorTab(tab) {
  const isLoc = tab === 'location';
  document.getElementById('locationBuilderCard').style.display = isLoc ? '' : 'none';
  document.getElementById('regionBuilderCard').style.display   = isLoc ? 'none' : '';
  const locBtn = document.getElementById('tabLocBtn');
  const regBtn = document.getElementById('tabRegBtn');
  if (isLoc) {
    locBtn.style.background = 'rgba(196,152,58,0.12)'; locBtn.style.color = '#c4983a'; locBtn.style.borderColor = 'rgba(196,152,58,0.4)';
    regBtn.style.background = 'transparent';           regBtn.style.color = '#a8b6c8'; regBtn.style.borderColor = 'rgba(46,90,59,0.4)';
  } else {
    regBtn.style.background = 'rgba(46,90,59,0.18)'; regBtn.style.color = '#8fc6a8'; regBtn.style.borderColor = 'rgba(46,90,59,0.5)';
    locBtn.style.background = 'transparent';          locBtn.style.color = '#a8b6c8'; locBtn.style.borderColor = 'rgba(196,152,58,0.2)';
  }
}

// ── Region Save ───────────────────────────────────────────────
function saveRegion() {
  const name = document.getElementById('regName').value.trim();
  if (!name) { showRegFlash('Enter a region name.', true); return; }
  const mapData = safeReadMap();
  const type    = document.getElementById('regType').value;
  const blurb   = document.getElementById('regBlurb').value.trim();
  const desc    = document.getElementById('regDescription').value.trim();
  const existing = mapData.regions.findIndex(r => r.name.toLowerCase()===name.toLowerCase() && r.type===type);
  const now = new Date().toISOString();
  if (existing !== -1) {
    mapData.regions[existing] = { ...mapData.regions[existing], name, type, blurb, description:desc, updatedAt:now };
    showRegFlash(`"${name}" updated in Map.`);
  } else {
    mapData.regions.unshift({ id:uidMap('reg'), name, type, blurb, description:desc, createdAt:now, updatedAt:now });
    showRegFlash(`"${name}" saved to Map.`);
  }
  safeWriteMap(mapData);
}

function showRegFlash(msg, err) {
  const el = document.getElementById('regFlash');
  el.textContent = msg;
  el.style.color = err ? '#ff8a7b' : '#8fc6a8';
}

// ── Location Save to Map ──────────────────────────────────────
function saveLocationToMap() {
  const loc = locationFromInputs();
  if (!loc.name) { showFlash('Enter a name before saving to Map.', true); return; }
  const mapData = safeReadMap();
  const existing = mapData.locations.findIndex(l => l.name.toLowerCase()===loc.name.toLowerCase());
  const now = new Date().toISOString();
  const entry = {
    id: existing !== -1 ? mapData.locations[existing].id : uidMap('loc'),
    name: loc.name, type: loc.type, atmosphere: loc.atmosphere,
    description: loc.description, notableFeatures: loc.features,
    createdAt: existing !== -1 ? mapData.locations[existing].createdAt : now,
    updatedAt: now
  };
  if (existing !== -1) {
    mapData.locations[existing] = entry;
    showFlash(`"${loc.name}" updated in Map.`);
  } else {
    mapData.locations.unshift(entry);
    showFlash(`"${loc.name}" saved to Map.`);
  }
  safeWriteMap(mapData);
}

const FEATURES = {
  'Tavern / Inn': ['A private room upstairs with a suspiciously new lock','A cellar entrance behind the bar that the owner discourages questions about','A wanted notice pinned near the door, weeks old but never taken down'],
  'Village': ['A communal notice board covered in requests and rumors','An ancient well said to grant dreams to those who drink from it at midnight','A sealed building at the edge of town that nobody talks about'],
  'Dungeon': ['A pit trap in the third corridor, reset recently','Carvings on the walls depicting the original purpose of this place','A locked iron door with no keyhole — only a symbol to press your palm against'],
  'Cave / Cavern': ['A subterranean stream drinkable but ice-cold','An alcove filled with carefully stacked bones, arranged by size','A natural chimney that vents smoke and can be climbed with difficulty'],
  'Forest': ['A clearing where no animals go and no birds sing','A trail of unusual footprints that do not match any known creature','Ancient boundary stones marking a territory nobody claims anymore'],
  'Ruins': ['A sealed vault door with a combination lock of symbols','Frescoes on an interior wall still vibrant despite the ruin around them','A cellar intact beneath the rubble, accessible through a collapsed section'],
  'Keep / Castle': ['A secret passage behind the great hall fireplace','A dungeon level never shown on official plans','A tower room that was clearly sealed from the outside'],
  'Temple / Shrine': ['An inner sanctum requiring a specific ritual to enter safely','A confessional where secrets are said to be held against the penitent','A pool of still water that shows the past instead of the present'],
};

const ENCOUNTERS = {
  'Tavern / Inn': ['A drunk mercenary spoiling for a fight (CR 1/2)','Two thieves casing the wealthier-looking patrons','An informant who\'ll talk if bought enough drinks'],
  'Village': ['Villagers hostile to outsiders following a recent incident','A pair of bandits posing as merchants collecting a "toll"','A child following the party, believing them to be heroes from a story'],
  'Dungeon': ['1d4 Giant Rats (CR 1/8) in the first corridor','Animated armor (CR 1) standing guard at a T-junction','A wandering Gelatinous Cube (CR 2) consuming whatever it finds'],
  'Cave / Cavern': ['1d6 Stirges (CR 1/8) roosting in an upper passage','A Cave Bear (CR 2) with cubs — aggressive if cornered','A Grick (CR 2) lurking in a crack in the ceiling'],
  'Forest': ['1d4 Wolves (CR 1/4) shadowing the party since the treeline','A Bandit patrol (4× CR 1/8) claiming territorial rights','A Green Hag (CR 3) offering directions in exchange for a favor'],
  'Ruins': ['1d8 Skeletons (CR 1/4) animated by residual magic','A Scarecrow (CR 1) that activates when the fresco room is disturbed','2 Wights (CR 3) guarding the vault level'],
  'Keep / Castle': ['4 Guards (CR 1/8) at the gatehouse who demand papers','A Spy (CR 1) embedded in the household staff','A Specter (CR 1) haunting the collapsed tower after dark'],
  'Temple / Shrine': ['A Cult Fanatic (CR 2) conducting a rite in the sanctum','1d4 Shadows (CR 1/2) that manifest when the candles are extinguished','A Banshee (CR 4) bound to protect the inner sanctum'],
};

const LORE = [
  'This place was built during the Third Expansion, when the empire\'s reach exceeded its wisdom.',
  'Local stories claim something was buried here that was never meant to be found again.',
  'Three different factions have held claim to this location in the last century — none peacefully.',
  'The original builders vanished before construction was completed. No record explains why.',
  'A treaty was once signed here that has since been broken by all parties involved.',
  'Every generation someone is born nearby with strange gifts that they credit to this place.',
];

// ── Utilities ─────────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function uid() { return `loc-${Date.now()}-${Math.floor(Math.random()*100000)}`; }
function safeRead() {
  try { const v = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); return Array.isArray(v)?v:[]; }
  catch { return []; }
}
function safeWrite(v) { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); }
function escHtml(v) { return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showFlash(msg, err) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.style.color = err ? '#ff8a7b' : '#8fc6a8';
}

// ── Name Generation ───────────────────────────────────────────
function generateName() {
  const type = document.getElementById('locType').value;
  let name = '';
  if (type === 'Tavern / Inn') {
    name = `The ${pick(TAVERN_ADJ)} ${pick(TAVERN_NOUN)}`;
  } else if (type === 'Village' || type === 'Town' || type === 'City') {
    name = pick(PLACE_PREFIX) + pick(PLACE_SUFFIX);
    name = name.charAt(0).toUpperCase() + name.slice(1);
  } else if (type === 'Dungeon' || type === 'Underground') {
    name = `${pick(DUNGEON_PRE)} ${pick(DUNGEON_SUF)}`;
  } else if (type === 'Forest') {
    name = `${pick(FOREST_ADJ)} ${pick(FOREST_NOUN)}`;
  } else if (type === 'Keep / Castle' || type === 'Tower') {
    name = `${pick(KEEP_ADJ)} ${pick(KEEP_NOUN)}`;
  } else if (type === 'Temple / Shrine') {
    name = `${pick(TEMPLE_ADJ)} ${pick(TEMPLE_NOUN)}`;
  } else {
    // Generic: cave, ruins, wilderness, coastal, other
    name = `${pick(PLACE_PREFIX)}${pick(PLACE_SUFFIX)}`;
    name = name.charAt(0).toUpperCase() + name.slice(1);
  }
  document.getElementById('locName').value = name;
  return name;
}

function generateDetails() {
  const type = document.getElementById('locType').value;
  const atmoOpts = document.getElementById('locAtmosphere').options;
  document.getElementById('locAtmosphere').selectedIndex = Math.floor(Math.random() * atmoOpts.length);

  const descPool = DESCRIPTIONS[type] || DESCRIPTIONS['Ruins'];
  document.getElementById('locDescription').value = pick(descPool);

  const featPool = FEATURES[type] || FEATURES['Ruins'];
  document.getElementById('locFeatures').value = pick(featPool);

  const encPool = ENCOUNTERS[type] || ENCOUNTERS['Ruins'];
  document.getElementById('locEncounters').value = pick(encPool);

  document.getElementById('locLore').value = pick(LORE);
}

function generateFull() {
  generateName();
  generateDetails();
  updatePreview();
}

// ── Preview ───────────────────────────────────────────────────
function updatePreview() {
  const name      = document.getElementById('locName').value.trim() || 'Unnamed Location';
  const type      = document.getElementById('locType').value;
  const region    = document.getElementById('locRegion').value.trim();
  const atmo      = document.getElementById('locAtmosphere').value;
  const desc      = document.getElementById('locDescription').value.trim();
  const features  = document.getElementById('locFeatures').value.trim();
  const encounters= document.getElementById('locEncounters').value.trim();
  const lore      = document.getElementById('locLore').value.trim();

  let html = `<strong>${escHtml(name)}</strong>`;
  html += ` &nbsp;<span class="loc-type">${escHtml(type)}</span>`;
  if (region) html += ` &nbsp;<span style="color:#a8b6c8;font-size:0.82rem;">— ${escHtml(region)}</span>`;
  html += `<br><span style="color:#8fc6a8;font-size:0.82rem;">Atmosphere: ${escHtml(atmo)}</span>`;
  if (desc)      html += `<div class="loc-section">Description</div>${escHtml(desc)}`;
  if (features)  html += `<div class="loc-section">Notable Features</div>${escHtml(features)}`;
  if (encounters)html += `<div class="loc-section">Encounters / Hazards</div>${escHtml(encounters)}`;
  if (lore)      html += `<div class="loc-section">Lore &amp; History</div>${escHtml(lore)}`;

  document.getElementById('preview').innerHTML = html;
}

// ── Build Location Object ─────────────────────────────────────
function locationFromInputs(existingId) {
  return {
    id:          existingId || uid(),
    name:        document.getElementById('locName').value.trim(),
    type:        document.getElementById('locType').value,
    region:      document.getElementById('locRegion').value.trim(),
    atmosphere:  document.getElementById('locAtmosphere').value,
    description: document.getElementById('locDescription').value.trim(),
    features:    document.getElementById('locFeatures').value.trim(),
    encounters:  document.getElementById('locEncounters').value.trim(),
    lore:        document.getElementById('locLore').value.trim(),
    notes:       document.getElementById('locNotes').value.trim(),
    createdAt:   new Date().toISOString(),
    updatedAt:   new Date().toISOString(),
  };
}

// ── Save to Registry ──────────────────────────────────────────
function saveLocation() {
  const loc = locationFromInputs();
  if (!loc.name) { showFlash('Enter a name before saving.', true); return; }

  const list = safeRead();
  const idx  = list.findIndex(l => l.name.toLowerCase() === loc.name.toLowerCase() && l.type === loc.type);
  if (idx !== -1) {
    list[idx] = { ...list[idx], ...loc, id: list[idx].id, createdAt: list[idx].createdAt };
    showFlash(`"${loc.name}" updated in registry.`);
  } else {
    list.unshift(loc);
    showFlash(`"${loc.name}" saved to registry.`);
  }
  safeWrite(list);
  renderRegistry();
}

// ── Add to Campaign ───────────────────────────────────────────
function addToCampaign() {
  const loc = locationFromInputs();
  if (!loc.name) { showFlash('Enter a name before adding to campaign.', true); return; }
  if (!localStorage.getItem('dndToolsActiveCampaignId')) {
    showFlash('No active campaign — open a campaign first from the Hub.', true);
    return;
  }

  // Compose campaign notes from all descriptive fields
  const parts = [];
  if (loc.type)        parts.push(`Type: ${loc.type}`);
  if (loc.region)      parts.push(`Region: ${loc.region}`);
  if (loc.atmosphere)  parts.push(`Atmosphere: ${loc.atmosphere}`);
  if (loc.description) parts.push(`\n${loc.description}`);
  if (loc.features)    parts.push(`\nNotable Features:\n${loc.features}`);
  if (loc.encounters)  parts.push(`\nEncounters / Hazards:\n${loc.encounters}`);
  if (loc.lore)        parts.push(`\nLore:\n${loc.lore}`);
  if (loc.notes)       parts.push(`\nDM Notes:\n${loc.notes}`);

  localStorage.setItem(ADD_KEY, JSON.stringify({ name: loc.name, notes: parts.join('\n') }));
  showFlash(`"${loc.name}" queued — open Campaign to see it in your locations.`);
  document.getElementById('campaignNavLink').style.display = '';
}

// ── Load into Builder from Registry ──────────────────────────
function loadIntoBuilder(id) {
  const loc = safeRead().find(l => l.id === id);
  if (!loc) return;
  document.getElementById('locName').value        = loc.name || '';
  document.getElementById('locType').value        = loc.type || 'Other';
  document.getElementById('locRegion').value      = loc.region || '';
  document.getElementById('locAtmosphere').value  = loc.atmosphere || 'Eerie';
  document.getElementById('locDescription').value = loc.description || '';
  document.getElementById('locFeatures').value    = loc.features || '';
  document.getElementById('locEncounters').value  = loc.encounters || '';
  document.getElementById('locLore').value        = loc.lore || '';
  document.getElementById('locNotes').value       = loc.notes || '';
  updatePreview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteFromRegistry(id) {
  const list = safeRead();
  const loc  = list.find(l => l.id === id);
  if (!loc) return;
  if (!confirm(`Delete "${loc.name}" from the registry?`)) return;
  safeWrite(list.filter(l => l.id !== id));
  renderRegistry();
}

// ── Registry Render ───────────────────────────────────────────
function renderRegistry() {
  const list = safeRead();
  const el   = document.getElementById('registryList');
  if (!list.length) {
    el.innerHTML = '<div class="empty">No locations saved yet. Generate one above and click Save to Registry.</div>';
    return;
  }
  el.innerHTML = '<div class="registry-list">' + list.map(loc => `
    <div class="reg-card">
      <div class="reg-card-name">${escHtml(loc.name)}</div>
      <div class="reg-card-type">${escHtml(loc.type)}${loc.region ? ' &mdash; ' + escHtml(loc.region) : ''}</div>
      ${loc.description ? `<div class="reg-card-desc">${escHtml(loc.description.slice(0,120))}${loc.description.length>120?'…':''}</div>` : ''}
      <div class="reg-card-actions">
        <button onclick="loadIntoBuilder('${escHtml(loc.id)}')">Load</button>
        <button class="btn-campaign" onclick="queueFromRegistry('${escHtml(loc.id)}')">+ Campaign</button>
        <button class="btn-danger" onclick="deleteFromRegistry('${escHtml(loc.id)}')">Delete</button>
      </div>
    </div>`).join('') + '</div>';
}

function queueFromRegistry(id) {
  const loc = safeRead().find(l => l.id === id);
  if (!loc) return;
  if (!localStorage.getItem('dndToolsActiveCampaignId')) {
    showFlash('No active campaign — open a campaign first from the Hub.', true);
    return;
  }
  const parts = [];
  if (loc.type)        parts.push(`Type: ${loc.type}`);
  if (loc.region)      parts.push(`Region: ${loc.region}`);
  if (loc.atmosphere)  parts.push(`Atmosphere: ${loc.atmosphere}`);
  if (loc.description) parts.push(`\n${loc.description}`);
  if (loc.features)    parts.push(`\nNotable Features:\n${loc.features}`);
  if (loc.encounters)  parts.push(`\nEncounters / Hazards:\n${loc.encounters}`);
  if (loc.lore)        parts.push(`\nLore:\n${loc.lore}`);
  if (loc.notes)       parts.push(`\nDM Notes:\n${loc.notes}`);
  localStorage.setItem(ADD_KEY, JSON.stringify({ name: loc.name, notes: parts.join('\n') }));
  showFlash(`"${loc.name}" queued — open Campaign to see it in your locations.`);
  document.getElementById('campaignNavLink').style.display = '';
}

// ── Wire Events ───────────────────────────────────────────────
document.getElementById('genNameBtn').addEventListener('click',    () => { generateName();    updatePreview(); });
document.getElementById('genDetailsBtn').addEventListener('click', () => { generateDetails(); updatePreview(); });
document.getElementById('genAllBtn').addEventListener('click',     generateFull);
document.getElementById('saveLocBtn').addEventListener('click',    saveLocation);
document.getElementById('saveToMapBtn').addEventListener('click',  saveLocationToMap);
document.getElementById('addCampaignBtn').addEventListener('click',addToCampaign);
document.getElementById('saveRegBtn').addEventListener('click',    saveRegion);
document.getElementById('locType').addEventListener('change', updatePreview);

['locName','locRegion','locAtmosphere','locDescription','locFeatures','locEncounters','locLore','locNotes']
  .forEach(id => document.getElementById(id).addEventListener('input', updatePreview));

// ── Init ──────────────────────────────────────────────────────
generateFull();
renderRegistry();
</script>
